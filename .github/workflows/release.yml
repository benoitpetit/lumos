name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-launchers-linux-windows:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-mingw-w64-x86-64

      - name: Build Linux and Windows launchers
        run: |
          bash scripts/build-launchers.sh linux
          bash scripts/build-launchers.sh windows

      - name: Upload launchers artifact
        uses: actions/upload-artifact@v4
        with:
          name: launchers-linux-windows
          path: runtime/lumos-launcher-*

  build-launchers-macos:
    needs: [test]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS launchers
        run: |
          bash scripts/build-launchers.sh macos

      - name: Upload launchers artifact
        uses: actions/upload-artifact@v4
        with:
          name: launchers-macos
          path: runtime/lumos-launcher-darwin-*

  build-launchers-linux-aarch64:
    needs: [test]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Linux aarch64 launcher
        run: |
          bash scripts/build-launchers.sh linux-aarch64

      - name: Upload launchers artifact
        uses: actions/upload-artifact@v4
        with:
          name: launchers-linux-aarch64
          path: runtime/lumos-launcher-linux-aarch64

  github-release:
    needs: [test, build-launchers-linux-windows, build-launchers-macos, build-launchers-linux-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux/Windows launchers
        uses: actions/download-artifact@v4
        with:
          name: launchers-linux-windows
          path: release-assets/

      - name: Download macOS launchers
        uses: actions/download-artifact@v4
        with:
          name: launchers-macos
          path: release-assets/

      - name: Download Linux aarch64 launchers
        uses: actions/download-artifact@v4
        with:
          name: launchers-linux-aarch64
          path: release-assets/

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat << 'HEADER' > release_body.md
          ## 📦 About the launcher files

          The `lumos-launcher-*` binaries attached below are **precompiled Lua runtimes**, not standalone applications. They are internal building blocks used by the `lumos package` command.

          When you run:

          ```bash
          lumos package src/main.lua -o myapp
          ```

          The CLI combines your amalgamated Lua code with the appropriate launcher to produce the final self-contained executable.

          If the launcher for your target platform is missing locally, `lumos package --sync-runtime` downloads it automatically from this release page.

          ## Changelog

          HEADER
          awk "/^## \\[$VERSION\\]/{flag=1; next} flag && /^## \\[/{flag=0} flag" CHANGELOG.md >> release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/lumos-launcher-*
          body_path: release_body.md

  luarocks:
    needs: [test, build-launchers-linux-windows, build-launchers-macos, build-launchers-linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux/Windows launchers
        uses: actions/download-artifact@v4
        with:
          name: launchers-linux-windows
          path: runtime/

      - name: Download macOS launchers
        uses: actions/download-artifact@v4
        with:
          name: launchers-macos
          path: runtime/

      - name: Download Linux aarch64 launchers
        uses: actions/download-artifact@v4
        with:
          name: launchers-linux-aarch64
          path: runtime/

      - name: List runtime directory
        run: ls -la runtime/

      - name: Setup Lua
        uses: hishamhm/gh-actions-lua@master
        with:
          luaVersion: '5.4'

      - name: Setup LuaRocks
        uses: hishamhm/gh-actions-luarocks@master

      - name: Install dependencies
        run: |
          luarocks install luafilesystem
          luarocks install busted

      - name: Run tests
        run: |
          eval "$(luarocks path)"
          busted

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rockspec=lumos-${VERSION}-1.rockspec" >> $GITHUB_OUTPUT

      - name: Lint rockspec
        run: |
          eval "$(luarocks path)"
          luarocks lint ${{ steps.get_version.outputs.rockspec }}

      - name: Upload to LuaRocks
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          eval "$(luarocks path)"
          luarocks upload ${{ steps.get_version.outputs.rockspec }} --api-key="$LUAROCKS_API_KEY" || echo "Version may already exist on LuaRocks"
